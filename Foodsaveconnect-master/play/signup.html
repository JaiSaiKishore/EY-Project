<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign Up - FoodSaver Connect</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/auth.css">
  </head>
  <body>

    <div class="auth-page">
      <a href="index.html" class="back-home"><i class="fa fa-arrow-left"></i> Back to Home</a>

      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-logo"><i class="fa fa-leaf"></i> FoodSaver Connect</a>
          <h2>Create Your Account</h2>
          <p>Join the food rescue movement today</p>
        </div>

        <!-- Role Selector -->
        <div class="role-selector">
          <button type="button" class="role-option active" data-role="donor">
            <i class="fa fa-cutlery"></i>
            <span>Food Donor</span>
          </button>
          <button type="button" class="role-option" data-role="volunteer">
            <i class="fa fa-map-marker"></i>
            <span>Volunteer Scout</span>
          </button>
        </div>

        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" id="signup-name" placeholder="e.g. John Doe" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" id="signup-email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="form-control" id="signup-phone" placeholder="+91 98765 43210">
          </div>

          <!-- Donor-only field -->
          <div class="form-group" id="org-group">
            <label>Business / Organization <small>(optional)</small></label>
            <input type="text" class="form-control" id="signup-org" placeholder="e.g. Hotel Sunrise, Sharma Caterers">
          </div>

          <!-- Volunteer-only field -->
          <div class="form-group" id="availability-group" style="display:none;">
            <label>Availability</label>
            <select class="form-control" id="signup-availability">
              <option value="" disabled selected>When can you volunteer?</option>
              <option value="weekdays">Weekdays</option>
              <option value="weekends">Weekends</option>
              <option value="evenings">Evenings Only</option>
              <option value="flexible">Flexible / Anytime</option>
            </select>
          </div>

          <div class="form-group">
            <label>Location / Address</label>
            <div class="location-row">
              <input type="text" class="form-control" id="signup-location" placeholder="Enter your area or use GPS" required>
              <button type="button" class="btn-gps" id="btn-gps" title="Use GPS"><i class="fa fa-crosshairs"></i></button>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-control" id="signup-password" placeholder="Min. 8 characters" required minlength="8">
              <button type="button" class="password-toggle" tabindex="-1"><i class="fa fa-eye"></i></button>
            </div>
          </div>

          <button type="submit" class="btn-auth-submit" id="submit-btn">
            <i class="fa fa-user-plus"></i> Create Account
          </button>

          <div class="auth-message" id="auth-msg"></div>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="signin.html">Sign In</a>
        </div>
      </div>
    </div>

    <script src="js/jquery-min.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
