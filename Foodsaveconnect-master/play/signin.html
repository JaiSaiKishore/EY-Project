<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign In - FoodSaver Connect</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/auth.css">
  </head>
  <body>

    <div class="auth-page">
      <a href="index.html" class="back-home"><i class="fa fa-arrow-left"></i> Back to Home</a>

      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-logo"><i class="fa fa-leaf"></i> FoodSaver Connect</a>
          <h2>Welcome Back</h2>
          <p>Sign in to your account</p>
        </div>

        <!-- Role Selector -->
        <div class="role-selector">
          <button type="button" class="role-option active" data-role="donor">
            <i class="fa fa-cutlery"></i>
            <span>Food Donor</span>
          </button>
          <button type="button" class="role-option" data-role="volunteer">
            <i class="fa fa-map-marker"></i>
            <span>Volunteer Scout</span>
          </button>
        </div>

        <form class="auth-form" id="signin-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" id="signin-email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-control" id="signin-password" placeholder="Enter your password" required>
              <button type="button" class="password-toggle" tabindex="-1"><i class="fa fa-eye"></i></button>
            </div>
          </div>

          <a href="#" class="forgot-link">Forgot password?</a>

          <button type="submit" class="btn-auth-submit" id="submit-btn">
            <i class="fa fa-sign-in"></i> Sign In
          </button>

          <div class="auth-message" id="auth-msg"></div>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <script src="js/jquery-min.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
