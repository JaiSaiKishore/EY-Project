{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign Up - FoodSaver Connect</title>
    <link rel="stylesheet" href="{% static 'frontend/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'frontend/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'frontend/css/auth.css' %}">
  </head>
  <body>
    <div class="auth-page">
      <a href="{% url 'landing' %}" class="back-home"><i class="fa fa-arrow-left"></i> Back to Home</a>

      <div class="auth-card">
        <div class="auth-header">
          <a href="{% url 'landing' %}" class="auth-logo"><i class="fa fa-leaf"></i> FoodSaver Connect</a>
          <h2>Create Your Account</h2>
          <p>Join the food rescue movement today</p>
        </div>

        {% if error %}
        <div class="auth-message error">{{ error }}</div>
        {% endif %}

        <div class="role-selector">
          <button type="button" class="role-option active" data-role="donor" onclick="setRole('donor')">
            <i class="fa fa-cutlery"></i><span>Food Donor</span>
          </button>
          <button type="button" class="role-option" data-role="volunteer" onclick="setRole('volunteer')">
            <i class="fa fa-map-marker"></i><span>Volunteer Scout</span>
          </button>
        </div>

        <form class="auth-form" method="post" action="{% url 'signup' %}">
          {% csrf_token %}
          <input type="hidden" name="role" id="role-input" value="donor">

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" name="name" placeholder="e.g. John Doe" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="form-control" name="phone" placeholder="+91 98765 43210">
          </div>

          <div class="form-group" id="org-group">
            <label>Business / Organization <small>(optional)</small></label>
            <input type="text" class="form-control" name="org" placeholder="e.g. Hotel Sunrise">
          </div>

          <div class="form-group" id="availability-group" style="display:none;">
            <label>Availability</label>
            <select class="form-control" name="availability">
              <option value="" disabled selected>When can you volunteer?</option>
              <option value="weekdays">Weekdays</option>
              <option value="weekends">Weekends</option>
              <option value="evenings">Evenings Only</option>
              <option value="flexible">Flexible / Anytime</option>
            </select>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-control" name="password" placeholder="Min. 8 characters" required minlength="8">
              <button type="button" class="password-toggle" tabindex="-1" onclick="togglePassword(this)"><i class="fa fa-eye"></i></button>
            </div>
          </div>

          <button type="submit" class="btn-auth-submit" id="submit-btn">
            <i class="fa fa-user-plus"></i> Create Account
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="{% url 'signin' %}">Sign In</a>
        </div>
      </div>
    </div>

    <script>
      function setRole(role) {
        document.getElementById('role-input').value = role;
        document.querySelectorAll('.role-option').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-role') === role);
        });
        var orgGroup = document.getElementById('org-group');
        var availGroup = document.getElementById('availability-group');
        var submitBtn = document.getElementById('submit-btn');
        if (orgGroup) orgGroup.style.display = (role === 'donor') ? '' : 'none';
        if (availGroup) availGroup.style.display = (role === 'volunteer') ? '' : 'none';
        if (submitBtn) {
          submitBtn.classList.toggle('volunteer-accent', role === 'volunteer');
        }
      }
      function togglePassword(btn) {
        var input = btn.parentElement.querySelector('input');
        var icon = btn.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'fa fa-eye-slash'; }
        else { input.type = 'password'; icon.className = 'fa fa-eye'; }
      }
    </script>
  </body>
</html>
